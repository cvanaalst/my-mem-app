<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Memory — merge logic tests</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; background: #111; color: #eee; }
  h1 { font-size: 20px; }
  .pass { color: #32d74b; }
  .fail { color: #ff453a; }
  .case { padding: 8px 0; border-bottom: 1px solid #333; }
  .summary { font-size: 18px; font-weight: bold; margin-top: 20px; }
  pre { background: #1c1c1e; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
</style>
</head>
<body>
<h1>Second Memory — unit tests</h1>
<p>Runs the pure functions in <code>merge.js</code> and <code>db.js</code> directly in the browser. No test framework, no build step.</p>
<div id="results"></div>
<div id="summary" class="summary"></div>

<script type="module">
import { resolveRecord, mergeItemSets, computeMediaActions } from "./merge.js";
import { db } from "./db.js";
import { renderMarkdown } from "./markdown.js";

const results = document.getElementById("results");
let pass = 0, fail = 0;

function assertEqual(actual, expected, label) {
  const ok = JSON.stringify(actual) === JSON.stringify(expected);
  const div = document.createElement("div");
  div.className = "case";
  if (ok) {
    pass++;
    div.innerHTML = `<span class="pass">PASS</span> — ${label}`;
  } else {
    fail++;
    div.innerHTML = `<span class="fail">FAIL</span> — ${label}<br>
      <pre>expected: ${JSON.stringify(expected, null, 2)}\nactual:   ${JSON.stringify(actual, null, 2)}</pre>`;
  }
  results.appendChild(div);
}

function item(overrides) {
  return {
    id: "a", type: "text", title: "t", comment: "", tags: [],
    url: null, text: "x", mediaId: null, filename: null, mimeType: null,
    createdAt: "2026-01-01T00:00:00.000Z", updatedAt: "2026-01-01T00:00:00.000Z", deletedAt: null,
    ...overrides,
  };
}

// --- resolveRecord ---

assertEqual(resolveRecord(undefined, item()), item(), "resolveRecord: missing local -> remote wins");
assertEqual(resolveRecord(item(), undefined), item(), "resolveRecord: missing remote -> local wins");

{
  const older = item({ updatedAt: "2026-01-01T00:00:00.000Z" });
  const newer = item({ updatedAt: "2026-02-01T00:00:00.000Z", title: "newer" });
  assertEqual(resolveRecord(older, newer), newer, "resolveRecord: newer updatedAt wins among two live records");
  assertEqual(resolveRecord(newer, older), newer, "resolveRecord: order-independent");
}

{
  // Tombstone wins even though it's OLDER than the live edit — this is
  // the deliberate product decision: deletes are terminal.
  const tombstone = item({ updatedAt: "2026-01-01T00:00:00.000Z", deletedAt: "2026-01-01T00:00:00.000Z" });
  const laterEdit = item({ updatedAt: "2026-06-01T00:00:00.000Z", title: "edited after delete" });
  assertEqual(resolveRecord(tombstone, laterEdit), tombstone, "resolveRecord: tombstone wins over a LATER live edit");
  assertEqual(resolveRecord(laterEdit, tombstone), tombstone, "resolveRecord: tombstone wins regardless of argument order");
}

{
  const t1 = item({ updatedAt: "2026-01-01T00:00:00.000Z", deletedAt: "2026-01-01T00:00:00.000Z" });
  const t2 = item({ updatedAt: "2026-02-01T00:00:00.000Z", deletedAt: "2026-02-01T00:00:00.000Z" });
  assertEqual(resolveRecord(t1, t2), t2, "resolveRecord: between two tombstones, newer updatedAt wins");
}

// --- mergeItemSets ---

{
  // First-ever sync: no remote file yet (empty remote array).
  const local = [item({ id: "a" }), item({ id: "b" })];
  const { merged, stats } = mergeItemSets(local, []);
  assertEqual(merged.length, 2, "mergeItemSets: first sync keeps all local items");
  assertEqual(stats, { added: 0, updated: 0, deleted: 0 }, "mergeItemSets: first sync reports no local-facing changes (nothing new arrived from remote)");
}

{
  // Fresh device: empty local DB, remote has everything. This is the restore path.
  const remote = [item({ id: "a" }), item({ id: "b" })];
  const { merged, stats } = mergeItemSets([], remote);
  assertEqual(merged.length, 2, "mergeItemSets: fresh device pulls all remote items");
  assertEqual(stats, { added: 2, updated: 0, deleted: 0 }, "mergeItemSets: fresh device counts both as added");
}

{
  // Ordinary incremental sync: one unchanged, one updated remotely, one new remotely.
  const local = [
    item({ id: "a", title: "same" }),
    item({ id: "b", title: "old", updatedAt: "2026-01-01T00:00:00.000Z" }),
  ];
  const remote = [
    item({ id: "a", title: "same" }),
    item({ id: "b", title: "new", updatedAt: "2026-02-01T00:00:00.000Z" }),
    item({ id: "c", title: "brand new" }),
  ];
  const { merged, stats } = mergeItemSets(local, remote);
  assertEqual(merged.length, 3, "mergeItemSets: incremental sync unions all ids");
  assertEqual(stats, { added: 1, updated: 1, deleted: 0 }, "mergeItemSets: incremental sync counts added+updated correctly");
}

{
  // Delete on device A, later edit on device B: tombstone wins, counted as deleted.
  const local = [item({ id: "a", title: "edited on B", updatedAt: "2026-06-01T00:00:00.000Z" })];
  const remote = [item({ id: "a", deletedAt: "2026-01-01T00:00:00.000Z", updatedAt: "2026-01-01T00:00:00.000Z" })];
  const { merged, stats } = mergeItemSets(local, remote);
  assertEqual(merged[0].deletedAt, "2026-01-01T00:00:00.000Z", "mergeItemSets: tombstone resurrection is prevented");
  assertEqual(stats, { added: 0, updated: 0, deleted: 1 }, "mergeItemSets: counts as a local deletion");
}

{
  // Local-only item (not yet uploaded) must survive the merge untouched.
  const local = [item({ id: "a" })];
  const { merged, stats } = mergeItemSets(local, []);
  assertEqual(merged, local, "mergeItemSets: local-only item passes through unchanged");
  assertEqual(stats, { added: 0, updated: 0, deleted: 0 }, "mergeItemSets: local-only item is not counted as a local-facing change");
}

// --- computeMediaActions ---

{
  const items = [item({ id: "a", mediaId: "m1", filename: "photo.jpg", type: "image" })];
  const { toUpload, toDownload, toDeleteLocal } = computeMediaActions(items, new Set(["m1"]), new Set());
  assertEqual(toUpload.map((i) => i.id), ["a"], "computeMediaActions: local-only media queued for upload");
  assertEqual(toDownload, [], "computeMediaActions: nothing to download");
  assertEqual(toDeleteLocal, [], "computeMediaActions: nothing to delete locally");
}

{
  const items = [item({ id: "a", mediaId: "m1", filename: "photo.jpg", type: "image" })];
  const { toUpload, toDownload } = computeMediaActions(items, new Set(), new Set(["a__photo.jpg"]));
  assertEqual(toUpload, [], "computeMediaActions: nothing to upload when remote already has it");
  assertEqual(toDownload.length, 1, "computeMediaActions: remote-only media queued for download");
  assertEqual(toDownload[0].remoteName, "a__photo.jpg", "computeMediaActions: download uses correct remote filename");
}

{
  const items = [item({ id: "a", mediaId: "m1", filename: "photo.jpg", type: "image", deletedAt: "2026-01-01T00:00:00.000Z" })];
  const { toUpload, toDownload, toDeleteLocal } = computeMediaActions(items, new Set(["m1"]), new Set(["a__photo.jpg"]));
  assertEqual(toUpload, [], "computeMediaActions: tombstoned item never uploads media");
  assertEqual(toDownload, [], "computeMediaActions: tombstoned item never downloads media");
  assertEqual(toDeleteLocal.map((i) => i.id), ["a"], "computeMediaActions: tombstoned item with local media queued for local delete");
}

{
  const items = [item({ id: "a", mediaId: null, type: "link" })];
  const { toUpload, toDownload, toDeleteLocal } = computeMediaActions(items, new Set(), new Set());
  assertEqual([toUpload, toDownload, toDeleteLocal], [[], [], []], "computeMediaActions: items without mediaId are ignored");
}

// --- db.sortTagsByRecency (tag suggestion ordering) ---

{
  const stats = [
    { tag: "old", count: 5, lastUsed: "2026-01-01T00:00:00.000Z" },
    { tag: "new", count: 1, lastUsed: "2026-06-01T00:00:00.000Z" },
  ];
  const sorted = db.sortTagsByRecency(stats).map((s) => s.tag);
  assertEqual(sorted, ["new", "old"], "sortTagsByRecency: more recently used tag comes first, even with a lower count");
}

{
  const stats = [
    { tag: "rare", count: 1, lastUsed: "2026-03-01T00:00:00.000Z" },
    { tag: "frequent", count: 9, lastUsed: "2026-03-01T00:00:00.000Z" },
  ];
  const sorted = db.sortTagsByRecency(stats).map((s) => s.tag);
  assertEqual(sorted, ["frequent", "rare"], "sortTagsByRecency: equal recency falls back to higher count first");
}

{
  const stats = [
    { tag: "zebra", count: 2, lastUsed: "2026-03-01T00:00:00.000Z" },
    { tag: "apple", count: 2, lastUsed: "2026-03-01T00:00:00.000Z" },
  ];
  const sorted = db.sortTagsByRecency(stats).map((s) => s.tag);
  assertEqual(sorted, ["apple", "zebra"], "sortTagsByRecency: equal recency and count falls back to alphabetical");
}

{
  const original = [
    { tag: "b", count: 1, lastUsed: "2026-01-01T00:00:00.000Z" },
    { tag: "a", count: 1, lastUsed: "2026-02-01T00:00:00.000Z" },
  ];
  const originalCopy = JSON.parse(JSON.stringify(original));
  db.sortTagsByRecency(original);
  assertEqual(original, originalCopy, "sortTagsByRecency: does not mutate its input array");
}

// --- db.bucketItemsByWeek (reporting chart) ---

{
  const now = new Date("2026-07-15T12:00:00.000Z"); // a Wednesday
  const buckets = db.bucketItemsByWeek([], 4, now);
  assertEqual(buckets.length, 4, "bucketItemsByWeek: returns the requested number of weeks");
  assertEqual(buckets.every((b) => b.count === 0), true, "bucketItemsByWeek: empty item list gives all-zero counts");
}

{
  const now = new Date("2026-07-15T12:00:00.000Z");
  const items = [
    { createdAt: "2026-07-14T09:00:00.000Z" }, // this week (Mon before Wed "now")
    { createdAt: "2026-07-01T09:00:00.000Z" }, // ~2 weeks ago
    { createdAt: "2026-07-01T18:00:00.000Z" }, // same week as above
  ];
  const buckets = db.bucketItemsByWeek(items, 4, now);
  const total = buckets.reduce((sum, b) => sum + b.count, 0);
  assertEqual(total, 3, "bucketItemsByWeek: every item lands in exactly one of the returned weeks");
  assertEqual(buckets[buckets.length - 1].count, 1, "bucketItemsByWeek: most recent item falls in the last (current) bucket");
}

{
  const now = new Date("2026-07-15T12:00:00.000Z");
  const items = [{ createdAt: "2020-01-01T00:00:00.000Z" }]; // long before the 4-week window
  const buckets = db.bucketItemsByWeek(items, 4, now);
  const total = buckets.reduce((sum, b) => sum + b.count, 0);
  assertEqual(total, 0, "bucketItemsByWeek: items older than the window aren't counted anywhere");
}

// --- db.computeBacklinks (Detail view "Linked from" section) ---

{
  const items = [
    item({ id: "a", linkedIds: ["b"] }),
    item({ id: "b", linkedIds: [] }),
    item({ id: "c", linkedIds: ["b"] }),
  ];
  const backlinks = db.computeBacklinks(items, "b").map((i) => i.id);
  assertEqual(backlinks, ["a", "c"], "computeBacklinks: finds every item whose linkedIds points at the target");
}

{
  const items = [item({ id: "a", linkedIds: [] })];
  assertEqual(db.computeBacklinks(items, "a"), [], "computeBacklinks: an item with no incoming links has no backlinks");
}

{
  const items = [item({ id: "a", linkedIds: ["a"] })];
  assertEqual(db.computeBacklinks(items, "a"), [], "computeBacklinks: an item can't be its own backlink even if linkedIds is malformed");
}

{
  const items = [item({ id: "a", linkedIds: ["b"], deletedAt: "2026-01-02T00:00:00.000Z" })];
  assertEqual(db.computeBacklinks(items, "b"), [], "computeBacklinks: a deleted (tombstoned) item is never shown as a backlink");
}

{
  const items = [item({ id: "a" })]; // no linkedIds field at all — pre-linking-feature record
  assertEqual(db.computeBacklinks(items, "b"), [], "computeBacklinks: items without a linkedIds field are treated as having no links");
}

// --- db.computeLinkedIdSet (list view link badge) ---

{
  const items = [
    item({ id: "a", linkedIds: ["b"] }),
    item({ id: "b", linkedIds: [] }),
    item({ id: "c", linkedIds: [] }),
  ];
  const linked = db.computeLinkedIdSet(items);
  assertEqual([...linked].sort(), ["a", "b"], "computeLinkedIdSet: both the source and target of a link are marked linked");
  assertEqual(linked.has("c"), false, "computeLinkedIdSet: an item with no link relationship is left out");
}

{
  const items = [item({ id: "a", linkedIds: ["missing"] })];
  const linked = db.computeLinkedIdSet(items);
  assertEqual(linked.size, 0, "computeLinkedIdSet: a dangling link to a nonexistent id doesn't mark either end as linked");
}

{
  const items = [item({ id: "a", linkedIds: ["b"] }), item({ id: "b", linkedIds: [], deletedAt: "2026-01-02T00:00:00.000Z" })];
  const linked = db.computeLinkedIdSet(items);
  assertEqual(linked.size, 0, "computeLinkedIdSet: a link to a deleted item doesn't mark either end as linked");
}

{
  const items = [item({ id: "a" })]; // no linkedIds field at all
  assertEqual(db.computeLinkedIdSet(items).size, 0, "computeLinkedIdSet: items without a linkedIds field contribute nothing");
}

// --- db.listProgress / listSearchText (the "list" item type) ---

{
  const rows = [{ text: "milk", done: true }, { text: "eggs", done: false }, { text: "bread", done: true }];
  assertEqual(db.listProgress(rows), { done: 2, total: 3 }, "listProgress: counts done and total");
}

{
  assertEqual(db.listProgress([]), { done: 0, total: 0 }, "listProgress: empty list is 0 of 0");
  assertEqual(db.listProgress(undefined), { done: 0, total: 0 }, "listProgress: missing listItems is 0 of 0 (not a crash)");
}

{
  const rows = [{ text: "buy milk" }, { text: "call plumber", done: true }];
  assertEqual(db.listSearchText(rows), "buy milk call plumber", "listSearchText: joins all row text for search");
  assertEqual(db.listSearchText(undefined), "", "listSearchText: missing listItems yields empty string");
}

// --- markdown.renderMarkdown (Detail view rendering for text items) ---

{
  assertEqual(renderMarkdown(""), "", "renderMarkdown: empty input renders to empty string");
}

{
  assertEqual(renderMarkdown("hello world"), "<p>hello world</p>", "renderMarkdown: plain text becomes a paragraph");
}

{
  assertEqual(renderMarkdown("line one\nline two"), "<p>line one<br>line two</p>", "renderMarkdown: single newline within a paragraph becomes <br>");
}

{
  assertEqual(renderMarkdown("first\n\nsecond"), "<p>first</p><p>second</p>", "renderMarkdown: blank line separates paragraphs");
}

{
  assertEqual(renderMarkdown("# Title"), "<h1>Title</h1>", "renderMarkdown: # renders an h1");
  assertEqual(renderMarkdown("### Sub"), "<h3>Sub</h3>", "renderMarkdown: ### renders an h3");
}

{
  assertEqual(renderMarkdown("**bold** and *italic*"), "<p><strong>bold</strong> and <em>italic</em></p>", "renderMarkdown: bold and italic markers render correctly together");
}

{
  assertEqual(renderMarkdown("- one\n- two"), "<ul><li>one</li><li>two</li></ul>", "renderMarkdown: consecutive '- ' lines become a <ul>");
  assertEqual(renderMarkdown("1. one\n2. two"), "<ol><li>one</li><li>two</li></ol>", "renderMarkdown: consecutive numbered lines become an <ol>");
}

{
  assertEqual(renderMarkdown("[Anthropic](https://anthropic.com)"), '<p><a href="https://anthropic.com" target="_blank" rel="noopener">Anthropic</a></p>', "renderMarkdown: [label](url) renders a real link for an https URL");
}

{
  // Note: a URL with its own unbalanced parens (e.g. containing a "(")
  // isn't something this deliberately minimal parser handles — its
  // [^)]+ capture stops at the first ")", same as most small Markdown
  // implementations. Kept out of the URL here on purpose; this test is
  // only about the scheme-safety fallback, not paren-balancing.
  assertEqual(renderMarkdown("[click me](javascript:alert)"), "<p>click me</p>", "renderMarkdown: unsafe URL schemes fall back to plain text instead of a link");
}

{
  assertEqual(renderMarkdown("<scr" + "ipt>hi<\/scr" + "ipt>"), "<p>&lt;script&gt;hi&lt;/script&gt;</p>", "renderMarkdown: raw HTML in the source is escaped, not rendered");
}

{
  assertEqual(renderMarkdown('[x](http://a.com"><img src=1 onerror=y>)'), '<p><a href="http://a.com&quot;&gt;&lt;img src=1 onerror=y&gt;" target="_blank" rel="noopener">x</a></p>', "renderMarkdown: quotes/angle-brackets inside a URL can't break out of the href attribute");
}

// --- summary ---

const summary = document.getElementById("summary");
summary.innerHTML = fail === 0
  ? `<span class="pass">${pass}/${pass + fail} passed</span>`
  : `<span class="fail">${fail}/${pass + fail} FAILED</span> (${pass} passed)`;
</script>
</body>
</html>
